
{% extends 'listings/base.html' %}
{% block content %}
<form method="POST">
    {% csrf_token %}
    <label for="condition">Condition:</label>
    {{ form.condition }}

    <label for="start_date">Start Date:</label>
    {{ form.start_date }}

    <label for="end_date">End Date (optional):</label>
    {{ form.end_date }}

    <button type="submit">Set Condition</button>
</form>


{% endblock %}
